server:
  port: 8082
spring:
  application:
    name: iCanteen
  datasource:
    driver-class-name: com.mysql.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/iCanteen?useSSL=false&serverTimezone=UTC
    username: root
    password:
  redis:
    host:
    port: 6379
    password:
    database:
    lettuce:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 1
        time-between-eviction-runs: 10s
  jackson:
    default-property-inclusion: non_null # JSON处理时忽略非空字段
mybatis-plus:
  type-aliases-package: com.iCanteen.entity # 别名扫描包
logging:
  level:
    com.iCanteen: debug
  pattern:
    dateformat: mm:ss.SSS